<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hash</title>
    <!-- Include lz-string for compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Invisible overlay to capture clicks for URL generation */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-family: monospace;
            user-select: none;
        }
    </style>
</head>
<body>
    <iframe src="https://matias.ma/nsfw/"></iframe>
    <script>
        function checkAndRedirect() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const decoded = LZString.decompressFromEncodedURIComponent(hash);
                    if (decoded && (decoded.startsWith('http://') || decoded.startsWith('https://'))) {
                        window.location.replace(decoded);
                    }
                } catch (e) {
                    console.error("Failed to decode hash.", e);
                }
            }
        }

        // Check on initial load
        checkAndRedirect();

        // Check if user pastes the URL in the same tab
        window.addEventListener('hashchange', checkAndRedirect);

        // Logic for creating short URLs on any key press
        window.addEventListener('keydown', (e) => {
            // Prevent multiple prompts if one is already open
            if (document.body.hasAttribute('data-prompting')) return;
            document.body.setAttribute('data-prompting', 'true');
            
            setTimeout(() => {
                const url = prompt('Enter a long URL to shorten (must include http:// or https://):');
                document.body.removeAttribute('data-prompting');
                
                if (url) {
                    if (!url.startsWith('http://') && !url.startsWith('https://')) {
                        alert('Invalid URL! Must start with http:// or https://');
                        return;
                    }
                    const compressed = LZString.compressToEncodedURIComponent(url);
                    const baseUrl = window.location.href.split('#')[0];
                    const shortUrl = baseUrl + '#' + compressed;
                    
                    // Copy to clipboard
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(shortUrl).then(() => {
                            alert('Shortened URL copied to clipboard!\n\n' + shortUrl);
                        }).catch(err => {
                            prompt('Failed to copy automatically. Copy the shortened URL below:', shortUrl);
                        });
                    } else {
                        // Fallback for non-secure contexts (e.g. file:// protocol testing)
                        prompt('Copy the shortened URL below:', shortUrl);
                    }
                }
            }, 10);
        });
    </script>
</body>
</html>
